services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE: python:3.11
    ports:
      - "8002:8000"
    environment:
      DBHOST: postgres
      DBUSER: admin
      DBNAME: postgres
      DBPASS: LocalPasswordOnly
      MEDIA_ROOT: /media
      SECRET_KEY: changeme-set-in-production
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      DEFAULT_FROM_EMAIL: ""
      CSRF_TRUSTED_ORIGINS: "https://artists.capitalmusicnetwork.com"
      ALLOWED_HOSTS: "https://artists.capitalmusicnetwork.com"
      NAVIDROME_BASE_URL: "https://listen.capitalmusicnetwork.com"
      NAVIDROME_ADMIN_USER: admin
      NAVIDROME_ADMIN_PASS: your-navidrome-admin-password
    volumes:
      - ./media:/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: LocalPasswordOnly
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  internal:
